# Nginx -> uvicorn (127.0.0.1:8000)
# Faylni /etc/nginx/sites-available/oquv ga qo'ying.
# server_name o'rniga domeningizni yozing (domen yo'q bo'lsa: _ qoldiring).
# Rasm yuklash uchun client_max_body_size oshirilgan.

server {
    listen 80;
    server_name SIZNING_DOMEN;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
