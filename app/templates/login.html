<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — O'quv Markaz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#0f766e;--brand-2:#0b5c55;--accent:#e0a13c;--ink:#13211d;--muted:#67817a;--line:#e5eae8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Manrope',sans-serif;background:
        radial-gradient(1100px 600px at 80% -10%, #14403a 0%, transparent 55%),
        radial-gradient(900px 500px at -10% 110%, #123b35 0%, transparent 50%),
        #0e2a26;
      min-height:100vh;display:grid;place-items:center;padding:20px;color:var(--ink)}
    .box{width:100%;max-width:390px}
    .head{text-align:center;margin-bottom:22px;color:#fff}
    .head .logo{width:54px;height:54px;border-radius:14px;background:var(--accent);
      display:grid;place-items:center;font-family:'Sora';font-weight:700;color:#1a1206;
      font-size:26px;margin:0 auto 14px}
    .head h1{font-family:'Sora';font-weight:600;font-size:22px;letter-spacing:-.02em}
    .head p{color:#8fb3ac;font-size:13.5px;margin-top:4px}
    .card{background:#fff;border-radius:18px;padding:26px 24px;
      box-shadow:0 20px 60px rgba(0,0,0,.35)}
    label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 6px}
    input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;
      font-family:inherit;font-size:15px;background:#fbfdfc;margin-bottom:16px}
    input:focus{outline:none;border-color:var(--brand);background:#fff;
      box-shadow:0 0 0 3px rgba(15,118,110,.12)}
    button{width:100%;background:var(--brand);color:#fff;border:none;padding:13px;
      border-radius:11px;font-family:'Sora';font-weight:600;font-size:15px;cursor:pointer}
    button:hover{background:var(--brand-2)}
    .err{background:#f8e6e1;color:#a23c28;padding:11px 14px;border-radius:10px;
      font-size:13px;font-weight:500;margin-bottom:16px;text-align:center}
    .foot{text-align:center;color:#6f968e;font-size:11.5px;margin-top:18px}
  </style>
</head>
<body>
  <div class="box">
    <div class="head">
      <div class="logo">O</div>
      <h1>O'quv Markaz</h1>
      <p>Boshqaruv paneliga kirish</p>
    </div>
    <div class="card">
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      {% if current %}<div class="err" style="background:#eef4ff;color:#2f4d8a">Siz <b>{{ current.name }}</b> sifatida kirgansiz. Boshqa markazga kirish uchun quyida login qiling yoki <a href="/logout" style="color:#2f4d8a;text-decoration:underline">chiqing</a>.</div>{% endif %}
      <form method="post" action="/login">
        <label>Telefon raqami</label>
        <input name="phone" type="text" placeholder="+998 90 123 45 67" autocomplete="username" required>
        <label>Parol</label>
        <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="submit">Kirish</button>
      </form>
    </div>
    <div class="foot">Multi-tenant • Supabase • FastAPI</div>
  </div>
</body>
</html>
